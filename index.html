<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOBI Mobile</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg1:#edf4fb;
  --bg2:#d8e7f6;
  --bg3:#b7d2ee;
  --border:rgba(255,255,255,.45);
  --text:#111827;
  --muted:#64748b;
  --blue:#4b7cff;
  --blue2:#6fa7ff;
}

html,body{
  height:100%;
  min-height:100%;
}

body{
  font-family:Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%,rgba(255,255,255,.8),transparent 25%),
    radial-gradient(circle at 80% 15%,rgba(111,167,255,.4),transparent 30%),
    linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 1px,transparent 1px,transparent 80px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0px,rgba(255,255,255,.05) 1px,transparent 1px,transparent 80px);
  pointer-events:none;
  z-index:-1;
}

.header{
  position:fixed;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:min(480px,100%);
  height:96px;
  padding:18px 18px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(232,242,252,.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  z-index:80;
}

.logoTitle{
  font-size:36px;
  font-weight:800;
  line-height:1;
}

.logoSub{
  font-size:18px;
  color:var(--muted);
  margin-top:6px;
}

.robot{
  width:74px;
  height:74px;
  border-radius:50%;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:none;
  overflow:visible;
}

.robot img{
  width:100%;
  height:100%;
  display:block;
  object-fit:contain;
  border-radius:50%;
  filter:drop-shadow(0 0 18px rgba(75,124,255,.42));
}

.app{
  max-width:480px;
  margin:0 auto;
  height:100vh;
  min-height:100vh;
  padding:112px 14px 125px;
  display:flex;
  flex-direction:column;
}

.chat{
  width:100%;
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-behavior:smooth;
  padding-bottom:10px;
  -webkit-overflow-scrolling:touch;
}

.message{
  border-radius:26px;
  padding:18px;
  margin-bottom:16px;
  line-height:1.6;
  font-size:18px;
  backdrop-filter:blur(22px);
  box-shadow:0 12px 30px rgba(0,0,0,.08);
  word-wrap:break-word;
  overflow-wrap:anywhere;
  white-space:pre-wrap;
}

.botMessage{
  width:96%;
  max-width:96%;
  background:rgba(255,255,255,.58);
  border:1px solid var(--border);
}

.userMessage{
  width:75%;
  max-width:75%;
  margin-left:auto;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
}

.msgHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  font-size:17px;
  font-weight:700;
  color:var(--blue);
}

.msgTime{
  font-size:14px;
  color:#64748b;
  font-weight:500;
}

.inputPanel{
  position:fixed;
  left:50%;
  bottom:15px;
  transform:translateX(-50%);
  width:min(450px,calc(100vw - 24px));
  padding:10px;
  border-radius:26px;
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(30px);
  box-shadow:0 15px 35px rgba(0,0,0,.1);
  display:grid;
  grid-template-columns:44px 1fr 44px 44px;
  gap:8px;
  align-items:end;
  z-index:90;
}

textarea{
  width:100%;
  min-height:42px;
  max-height:120px;
  border:none;
  outline:none;
  background:transparent;
  resize:none;
  font-size:17px;
  font-family:Arial,sans-serif;
  padding:10px 2px;
  color:#111827;
}

textarea::placeholder{
  color:#64748b;
}

button,.fileLabel{
  width:44px;
  height:44px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  background:rgba(255,255,255,.72);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.sendBtn{
  background:linear-gradient(135deg,#4b7cff,#699eff);
  color:white;
}

.micListening{
  background:linear-gradient(135deg,#ff6b6b,#ff9f9f);
  color:white;
}

input[type=file]{
  display:none;
}

.status{
  display:none;
}

.menuOverlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.28);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
}

.menuOverlay.open{
  display:flex;
}

.menuCard{
  width:100%;
  max-width:420px;
  border-radius:30px;
  background:rgba(255,255,255,.78);
  border:1px solid rgba(255,255,255,.45);
  box-shadow:0 25px 70px rgba(31,58,95,.28);
  padding:22px;
}

.menuTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.menuTitle{
  font-size:24px;
  font-weight:800;
}

.menuSub{
  font-size:14px;
  color:#64748b;
  margin-top:4px;
}

.closeBtn{
  width:44px;
  height:44px;
  border-radius:16px;
  font-size:26px;
}

.menuGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.menuItem{
  border-radius:22px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.45);
  padding:16px;
  min-height:100px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}

.menuIcon{
  font-size:24px;
  margin-bottom:8px;
}

.menuName{
  font-size:16px;
  font-weight:800;
}

.menuDesc{
  font-size:13px;
  color:#64748b;
  margin-top:4px;
}
</style>
</head>

<script>
const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/ieuyswwsxlrom238xqom6wuun9mgd47i";
const TOBI_STORAGE_KEY = "tobi_chat_history_v2";

const START_MESSAGE = `Сергей, я готов.

Скажи голосом, напиши текстом или прикрепи TXT-файл.

Пример:
«Тоби, подведи итог дня»
«Разбери ответ пристава»
«Сделай текст запроса в Сбербанк»`;

let chatHistory = [];
let isSending = false;
let isListening = false;
let lastSentText = "";
let lastSentAt = 0;

function toggleMenu(){
  document.getElementById("menuOverlay").classList.toggle("open");
}

function openMenu(){
  document.getElementById("menuOverlay").classList.add("open");
}

function closeMenu(){
  document.getElementById("menuOverlay").classList.remove("open");
}

function getTime(date = new Date()){
  return date.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function setSendingState(value){
  isSending = value;
  const sendBtn = document.getElementById("sendBtn");
  if(sendBtn) sendBtn.disabled = value;
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function normalizeCommand(text){
  return String(text || "")
    .toLowerCase()
    .replace(/ё/g,"е")
    .replace(/[.,!?;:]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function createMessage(role,text){
  return {
    role: role,
    text: String(text || ""),
    time: getTime(),
    createdAt: new Date().toISOString()
  };
}

function saveMessages(){
  try{
    localStorage.setItem(TOBI_STORAGE_KEY,JSON.stringify(chatHistory));
  }catch(e){
    console.error("Ошибка сохранения истории:",e);
  }
}

function loadMessages(){
  try{
    const saved = localStorage.getItem(TOBI_STORAGE_KEY);
    const parsed = saved ? JSON.parse(saved) : [];

    if(Array.isArray(parsed)){
      chatHistory = parsed.filter(item =>
        item &&
        typeof item.text === "string" &&
        (item.role === "user" || item.role === "bot")
      );
    }
  }catch(e){
    console.error("Ошибка загрузки истории:",e);
    chatHistory = [];
  }

  if(!chatHistory.length){
    chatHistory = [createMessage("bot",START_MESSAGE)];
    saveMessages();
  }

  renderChat();
  scrollChatToBottom(false);
}

function clearChatHistory(){
  chatHistory = [createMessage("bot",START_MESSAGE)];
  saveMessages();
  renderChat();
  scrollChatToBottom(false);
}

function getMessageTime(message){
  if(message.time) return message.time;

  if(message.createdAt){
    const d = new Date(message.createdAt);
    if(!isNaN(d.getTime())) return getTime(d);
  }

  return getTime();
}

function renderMessage(message){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");

  if(message.role === "user"){
    div.className = "message userMessage";
    div.innerText = message.text;
  }else{
    div.className = "message botMessage";
    div.innerHTML = `
      <div class="msgHeader">
        <span>Ответ TOBI</span>
        <span class="msgTime">${getMessageTime(message)}</span>
      </div>
      <div>${escapeHtml(message.text)}</div>
    `;
  }

  chat.appendChild(div);
  return div;
}

function renderChat(){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  chatHistory.forEach(message => {
    renderMessage(message);
  });
}

function addMessage(role,text){
  const safeText = role === "bot" ? cleanAnswer(text) : String(text || "").trim();

  if(!safeText) return null;

  const message = createMessage(role,safeText);
  chatHistory.push(message);
  saveMessages();

  const element = renderMessage(message);

  if(role === "bot"){
    scrollToMessageTop(element);
  }else{
    scrollToMessageCenter(element);
  }

  return message;
}

function addUserMessage(text){
  return addMessage("user",text);
}

function addBotMessage(text){
  return addMessage("bot",text);
}

function scrollToMessageTop(element){
  setTimeout(()=>{
    element.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });
  },80);
}

function scrollToMessageCenter(element){
  setTimeout(()=>{
    element.scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  },80);
}

function scrollChatToBottom(smooth = true){
  const chat = document.getElementById("chat");

  setTimeout(()=>{
    chat.scrollTo({
      top: chat.scrollHeight,
      behavior: smooth ? "smooth" : "auto"
    });
  },80);
}

function cleanAnswer(value){
  if(value === null || value === undefined) return "";

  let text = String(value).trim();

  for(let i = 0; i < 7; i++){
    try{
      const parsed = JSON.parse(text);

      if(typeof parsed === "string"){
        text = parsed.trim();
        continue;
      }

      if(Array.isArray(parsed)){
        return parsed.map(item => cleanAnswer(item)).join("\n").trim();
      }

      if(parsed && typeof parsed === "object"){
        const keys = ["answer","response","text","result","message","output","content"];

        for(const key of keys){
          if(parsed[key] !== undefined){
            return cleanAnswer(parsed[key]);
          }
        }

        return JSON.stringify(parsed,null,2);
      }

      return String(parsed).trim();

    }catch(e){
      break;
    }
  }

  text = text
    .replace(/^\s*\{\s*["'](?:answer|response|text|result|message|output|content)["']\s*:\s*/i,"")
    .replace(/^["']|["']$/g,"")
    .replace(/["']?\s*\}\s*$/,"")
    .replace(/\\r\\n/g,"\n")
    .replace(/\\n/g,"\n")
    .replace(/\\t/g,"\t")
    .replace(/\\"/g,'"')
    .replace(/\\\\/g,"\\");

  return text.trim();
}

function isMenuCommand(text){
  const t = normalizeCommand(text);

  return (
    t === "открой" ||
    t === "открой меню" ||
    t === "открыть меню" ||
    t === "открой центр" ||
    t === "центр управления" ||
    t === "открой центр управления" ||
    t === "открыть центр управления" ||
    t === "тоби открой" ||
    t === "тоби открой меню" ||
    t === "тоби открыть меню" ||
    t === "тоби меню" ||
    t === "тоби открой центр управления"
  );
}

function isClearCommand(text){
  const t = normalizeCommand(text);

  return (
    t === "очисти чат" ||
    t === "очистить чат" ||
    t === "сбрось чат" ||
    t === "новый чат" ||
    t === "тоби очисти чат" ||
    t === "тоби новый чат"
  );
}

function shouldBlockDuplicate(text){
  const normalized = normalizeCommand(text);
  const now = Date.now();

  if(normalized && normalized === lastSentText && now - lastSentAt < 1500){
    return true;
  }

  lastSentText = normalized;
  lastSentAt = now;
  return false;
}

async function sendText(textFromVoice = null){
  if(isSending) return;

  const input = document.getElementById("userText");
  const text = String(textFromVoice !== null ? textFromVoice : input.value).trim();

  if(!text){
    addBotMessage("Напиши задачу.");
    return;
  }

  if(shouldBlockDuplicate(text)) return;

  addUserMessage(text);

  input.value = "";
  autoResizeInput();

  if(isClearCommand(text)){
    clearChatHistory();
    addBotMessage("Чат очищен. Начинаем заново.");
    return;
  }

  if(isMenuCommand(text)){
    openMenu();
    addBotMessage("Центр управления открыт.");
    return;
  }

  setStatus("TOBI думает...");
  setSendingState(true);

  try{
    const res = await fetch(MAKE_WEBHOOK_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        type:"text",
        text:text
      })
    });

    const raw = await res.text();

    if(!res.ok){
      addBotMessage("Ошибка Make. Статус: " + res.status + "\n\n" + raw);
      setStatus("Ошибка.");
      return;
    }

    const answer = cleanAnswer(raw) || "Ответ получен, но текст пустой.";

    addBotMessage(answer);
    setStatus("Готово.");

  }catch(e){
    addBotMessage("Ошибка соединения:\n\n" + e.message);
    setStatus("Ошибка.");
  }finally{
    setSendingState(false);
  }
}

function startVoice(){
  if(isListening || isSending) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    addBotMessage("Голосовой ввод поддерживается через Chrome.");
    return;
  }

  const voiceBtn = document.getElementById("voiceBtn");
  const input = document.getElementById("userText");

  const recognition = new SpeechRecognition();
  recognition.lang = "ru-RU";
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  let finalTranscript = "";
  let bestTranscript = "";
  let voiceSent = false;

  isListening = true;
  setStatus("Говори...");
  voiceBtn.classList.add("micListening");

  recognition.start();

  recognition.onresult = function(event){
    let interimTranscript = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
      const transcript = event.results[i][0].transcript.trim();

      if(event.results[i].isFinal){
        finalTranscript += " " + transcript;
      }else{
        interimTranscript += " " + transcript;
      }
    }

    bestTranscript = (finalTranscript || interimTranscript).trim();

    if(bestTranscript){
      input.value = bestTranscript;
      autoResizeInput();
    }
  };

  recognition.onerror = function(){
    setStatus("Ошибка голосового ввода.");
  };

  recognition.onend = function(){
    isListening = false;
    voiceBtn.classList.remove("micListening");

    const text = (finalTranscript || bestTranscript).trim();

    if(!text){
      setStatus("Голос не распознан.");
      return;
    }

    if(voiceSent) return;
    voiceSent = true;

    setStatus("Голос распознан.");
    sendText(text);
  };
}

async function handleFile(){
  if(isSending) return;

  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  const userTextInput = document.getElementById("userText");
  const userText = userTextInput.value.trim();

  if(!file) return;

  const fileName = file.name || "";
  const isTxt = fileName.toLowerCase().endsWith(".txt") || file.type === "text/plain";

  if(!isTxt){
    addBotMessage(`Сергей, пока я безопасно читаю только TXT-файлы.

Вы выбрали:
${fileName}

DOCX, PDF и фото подключим следующим шагом отдельно.`);
    setStatus("Пока доступен TXT.");
    fileInput.value = "";
    return;
  }

  const maxSize = 1024 * 1024;

  if(file.size > maxSize){
    addBotMessage(`Файл слишком большой:

${fileName}

Пока загружайте TXT-файл меньше 1 МБ.`);
    setStatus("Файл слишком большой.");
    fileInput.value = "";
    return;
  }

  const visibleUserMessage = userText
    ? `${userText}

📎 Файл: ${fileName}`
    : "📎 Файл: " + fileName;

  addUserMessage(visibleUserMessage);

  userTextInput.value = "";
  autoResizeInput();

  setStatus("TOBI читает TXT-файл...");

  const reader = new FileReader();

  reader.onload = async function(event){
    const fileText = String(event.target.result || "").trim();

    if(!fileText){
      addBotMessage(`Файл прочитан, но внутри нет текста:

${fileName}`);
      setStatus("Файл пустой.");
      fileInput.value = "";
      return;
    }

    const task = userText || "Проанализируй текст из файла и дай короткий понятный вывод.";

    const textForTobi = `Пользователь прикрепил TXT-файл.

Имя файла: ${fileName}

Задача пользователя:
${task}

Точное содержимое файла между метками:

--- НАЧАЛО ФАЙЛА ---
${fileText}
--- КОНЕЦ ФАЙЛА ---

Ответь коротко и по делу.
Анализируй только текст между метками.
Не придумывай то, чего нет в тексте.
Не говори про кодировки, BOM, XML, архивы, форматы и техническое устройство файла.`;

    try{
      setStatus("TOBI думает...");
      setSendingState(true);

      const res = await fetch(MAKE_WEBHOOK_URL,{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          type:"text",
          text:textForTobi
        })
      });

      const raw = await res.text();

      if(!res.ok){
        addBotMessage("Ошибка Make при отправке текста из файла. Статус: " + res.status + "\n\n" + raw);
        setStatus("Ошибка файла.");
        fileInput.value = "";
        return;
      }

      const answer = cleanAnswer(raw) || "Файл отправлен, но ответ пустой.";

      addBotMessage(answer);
      setStatus("Файл обработан.");
      fileInput.value = "";

    }catch(e){
      addBotMessage("Ошибка соединения с Make при отправке файла:\n\n" + e.message);
      setStatus("Ошибка файла.");
      fileInput.value = "";
    }finally{
      setSendingState(false);
    }
  };

  reader.onerror = function(){
    addBotMessage("Не удалось прочитать TXT-файл. Попробуйте другой файл.");
    setStatus("Ошибка чтения файла.");
    fileInput.value = "";
  };

  reader.readAsText(file,"UTF-8");
}

function autoResizeInput(){
  const textarea = document.getElementById("userText");
  textarea.style.height = "42px";
  textarea.style.height = Math.min(textarea.scrollHeight,120) + "px";
}

document.addEventListener("DOMContentLoaded",function(){
  loadMessages();

  const userText = document.getElementById("userText");

  userText.addEventListener("input",autoResizeInput);

  userText.addEventListener("keydown",function(event){
    if(event.key === "Enter" && !event.shiftKey){
      event.preventDefault();
      sendText();
    }
  });
});
</script>
