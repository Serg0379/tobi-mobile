<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tobi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --tg-blue:#2AABEE;
  --tg-blue2:#229ED9;
  --header-bg:#517DA2;
  --chat-bg:#DAD8CF;
  --out-bubble:#EFFFDE;
  --in-bubble:#FFFFFF;
  --text:#000000;
  --muted:#6D6D71;
}

html,body{height:100%;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--chat-bg);
  color:var(--text);
  overflow:hidden;
}

/* ---------- Login gate ---------- */
.gate{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,var(--tg-blue),var(--tg-blue2));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:500;
  padding:20px;
}

.gate.hidden{display:none;}

.gateCard{
  background:#fff;
  width:100%;
  max-width:340px;
  border-radius:16px;
  padding:28px 22px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.gateCard img{
  width:72px;
  height:72px;
  border-radius:50%;
  margin-bottom:14px;
}

.gateCard h1{
  font-size:20px;
  margin-bottom:6px;
}

.gateCard p{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

.gateCard input{
  width:100%;
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px 14px;
  font-size:15px;
  margin-bottom:12px;
  outline:none;
}

.gateCard input:focus{border-color:var(--tg-blue);}

.gateCard button{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  background:var(--tg-blue);
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.gateError{
  color:#e53935;
  font-size:13px;
  margin-bottom:10px;
  display:none;
}

/* ---------- Header (Telegram-style chat header) ---------- */
.header{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  background:var(--header-bg);
  color:#fff;
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 14px;
  z-index:80;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}

.headerAvatar{
  width:40px;height:40px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:#fff;
}

.headerAvatar img{width:100%;height:100%;object-fit:cover;}

.headerInfo{display:flex;flex-direction:column;line-height:1.2;}
.headerName{font-size:16px;font-weight:600;}
.headerStatus{font-size:12.5px;color:rgba(255,255,255,.75);}

/* ---------- Chat area ---------- */
.app{
  height:100%;
  padding:70px 0 74px;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:10px 10px 4px;
  background:var(--chat-bg);
  background-image:
    radial-gradient(circle at 20% 10%,rgba(255,255,255,.25),transparent 30%),
    radial-gradient(circle at 80% 90%,rgba(255,255,255,.2),transparent 30%);
}

.message{
  max-width:78%;
  margin-bottom:6px;
  padding:7px 10px 8px;
  border-radius:10px;
  font-size:15px;
  line-height:1.35;
  white-space:pre-wrap;
  word-wrap:break-word;
  position:relative;
  box-shadow:0 1px 1px rgba(0,0,0,.08);
}

.botMessage{
  background:var(--in-bubble);
  border-top-left-radius:2px;
  margin-right:auto;
}

.userMessage{
  background:var(--out-bubble);
  border-top-right-radius:2px;
  margin-left:auto;
}

.msgTime{
  display:block;
  text-align:right;
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

/* ---------- Input bar ---------- */
.inputPanel{
  position:fixed;
  left:0;right:0;bottom:0;
  background:#F5F5F5;
  border-top:1px solid #ddd;
  padding:8px 8px;
  display:grid;
  grid-template-columns:40px 1fr 40px;
  gap:6px;
  align-items:end;
  z-index:90;
}

textarea{
  width:100%;
  min-height:38px;
  max-height:100px;
  border:none;
  border-radius:20px;
  outline:none;
  background:#fff;
  resize:none;
  font-size:15px;
  padding:9px 14px;
  color:#111;
  border:1px solid #e2e2e2;
}

button,.fileLabel{
  width:40px;height:40px;
  border:none;border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  background:transparent;
  color:var(--tg-blue);
}

.sendBtn{
  background:var(--tg-blue);
  color:#fff;
}

button:disabled{opacity:.5;cursor:not-allowed;}

.micListening{background:#ff5555;color:#fff;}

input[type=file]{display:none;}

.typing{
  font-size:13px;
  color:var(--muted);
  padding:2px 10px 6px;
}

.menuBtn{
  margin-left:auto;
  background:transparent;
  color:#fff;
  font-size:22px;
}

.menuOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:300;
  display:none;
  align-items:flex-end;
}

.menuOverlay.open{display:flex;}

.menuSheet{
  background:#fff;
  width:100%;
  max-height:80vh;
  border-radius:16px 16px 0 0;
  padding:16px;
  overflow-y:auto;
}

.menuTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.menuTop h2{font-size:18px;}

.menuTabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.menuTab{
  flex:1;
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px;
  text-align:center;
  font-size:13px;
  background:#f5f5f5;
  cursor:pointer;
}

.menuTab.active{
  background:var(--tg-blue);
  color:#fff;
  border-color:var(--tg-blue);
}

.menuBody{
  font-size:14px;
  white-space:pre-wrap;
  line-height:1.4;
  color:#222;
}

.reminderItem{
  border-bottom:1px solid #eee;
  padding:8px 0;
}

.reminderName{font-weight:600;}
.reminderWhen{color:var(--muted);font-size:13px;}

.logoutBtn{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#e53935;
  color:#fff;
  font-size:15px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="gate" id="gate">
  <div class="gateCard">
    <img src="./tobi-robot.jpg" alt="Tobi">
    <h1>Tobi</h1>
    <p>Введи код доступа, чтобы продолжить</p>
    <div class="gateError" id="gateError">Неверный код доступа.</div>
    <input type="password" id="gateToken" placeholder="Код доступа" autocomplete="off">
    <button onclick="submitToken()">Войти</button>
  </div>
</div>

<div class="header">
  <div class="headerAvatar"><img src="./tobi-robot.jpg" alt="Tobi"></div>
  <div class="headerInfo">
    <div class="headerName">Tobi</div>
    <div class="headerStatus" id="headerStatus">в сети</div>
  </div>
  <button class="menuBtn" onclick="openMenu()">☰</button>
</div>

<div class="menuOverlay" id="menuOverlay" onclick="closeMenuOnOverlay(event)">
  <div class="menuSheet">
    <div class="menuTop">
      <h2>Tobi Center</h2>
      <button onclick="closeMenu()" style="background:none;color:#333;font-size:22px;">×</button>
    </div>
    <div class="menuTabs">
      <div class="menuTab active" data-tab="memory" onclick="switchTab('memory')">Память</div>
      <div class="menuTab" data-tab="reminders" onclick="switchTab('reminders')">Напоминания</div>
      <div class="menuTab" data-tab="settings" onclick="switchTab('settings')">Настройки</div>
    </div>
    <div class="menuBody" id="menuBody">Загрузка...</div>
  </div>
</div>

<div class="app">
  <div class="chat" id="chat"></div>
  <div class="typing" id="typing" style="display:none;">Tobi печатает... (может занять до минуты — общая история с Telegram)</div>
</div>

<div class="inputPanel">
  <label class="fileLabel">
    📎
    <input type="file" id="fileInput" accept=".txt,text/plain" onchange="handleFile()"/>
  </label>

  <textarea id="userText" placeholder="Сообщение"></textarea>

  <button id="sendBtn" class="sendBtn" onclick="sendText()">➤</button>
</div>

<script>
const API_BASE = "https://sergey-tobi.duckdns.org";
const TOKEN_KEY = "tobi_web_token";
const STORAGE_KEY = "tobi_chat_history_v6";
const CLIENT_ID_KEY = "tobi_client_id";

let chatHistory = [];
let isSending = false;
let tobiToken = localStorage.getItem(TOKEN_KEY) || "";

function getClientId(){
  let id = localStorage.getItem(CLIENT_ID_KEY);
  if(!id){
    id = "web-" + Math.random().toString(36).slice(2) + Date.now();
    localStorage.setItem(CLIENT_ID_KEY, id);
  }
  return id;
}

function getTime(date = new Date()){
  return date.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

function escapeHtml(text){
  return String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function saveMessages(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
}

function loadMessages(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    chatHistory = saved ? JSON.parse(saved) : [];
  }catch(e){
    chatHistory = [];
  }
  if(!chatHistory.length){
    chatHistory = [{role:"bot", text:"Привет! Я Tobi. Пиши, что нужно.", time:getTime()}];
    saveMessages();
  }
  renderChat();
}

function renderChat(){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  chatHistory.forEach(renderMessage);
  scrollToBottom();
}

function renderMessage(m){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + (m.role === "user" ? "userMessage" : "botMessage");
  div.innerHTML = escapeHtml(m.text).replace(/\n/g,"<br>") + '<span class="msgTime">' + (m.time || getTime()) + '</span>';
  chat.appendChild(div);
  return div;
}

function addMessage(role, text){
  const m = {role, text: String(text||"").trim(), time:getTime()};
  if(!m.text) return;
  chatHistory.push(m);
  saveMessages();
  renderMessage(m);
  scrollToBottom();
}

function scrollToBottom(){
  const chat = document.getElementById("chat");
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
}

function setSending(value){
  isSending = value;
  document.getElementById("sendBtn").disabled = value;
  document.getElementById("typing").style.display = value ? "block" : "none";
  if(value) scrollToBottom();
}

function autoResizeInput(){
  const t = document.getElementById("userText");
  t.style.height = "38px";
  t.style.height = Math.min(t.scrollHeight,100) + "px";
}

async function callTobi(message){
  const res = await fetch(API_BASE + "/api/chat", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-tobi-token": tobiToken
    },
    body: JSON.stringify({ message, clientId: getClientId() })
  });

  if(res.status === 401){
    localStorage.removeItem(TOKEN_KEY);
    location.reload();
    return null;
  }

  if(!res.ok){
    throw new Error("Ошибка сервера: " + res.status);
  }

  const data = await res.json();
  return data.answer;
}

async function sendText(voiceText){
  if(isSending) return;
  const input = document.getElementById("userText");
  const text = String(voiceText !== undefined ? voiceText : input.value).trim();
  if(!text) return;

  addMessage("user", text);
  input.value = "";
  autoResizeInput();

  setSending(true);
  try{
    const answer = await callTobi(text);
    if(answer !== null) addMessage("bot", answer || "Пустой ответ.");
  }catch(e){
    addMessage("bot", "Ошибка соединения: " + e.message);
  }finally{
    setSending(false);
  }
}

async function handleFile(){
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  if(!file) return;

  const isTxt = file.name.toLowerCase().endsWith(".txt") || file.type === "text/plain";
  if(!isTxt){
    addMessage("bot", "Пока читаю только TXT-файлы.");
    fileInput.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    const fileText = String(e.target.result || "").trim();
    addMessage("user", "📎 Файл: " + file.name);
    setSending(true);
    try{
      const answer = await callTobi(
        `Прикреплён файл ${file.name}. Содержимое:\n\n${fileText}\n\nПроанализируй и дай короткий вывод.`
      );
      if(answer !== null) addMessage("bot", answer);
    }catch(err){
      addMessage("bot", "Ошибка при отправке файла: " + err.message);
    }finally{
      setSending(false);
      fileInput.value = "";
    }
  };
  reader.readAsText(file, "UTF-8");
}

function submitToken(){
  const val = document.getElementById("gateToken").value.trim();
  if(!val){ return; }
  tobiToken = val;
  localStorage.setItem(TOKEN_KEY, val);
  document.getElementById("gate").classList.add("hidden");
  loadMessages();
}

function openMenu(){
  document.getElementById("menuOverlay").classList.add("open");
  switchTab("memory");
}

function closeMenu(){
  document.getElementById("menuOverlay").classList.remove("open");
}

function closeMenuOnOverlay(e){
  if(e.target.id === "menuOverlay") closeMenu();
}

async function apiGet(path){
  const res = await fetch(API_BASE + path, { headers:{ "x-tobi-token": tobiToken } });
  if(!res.ok) throw new Error("Ошибка: " + res.status);
  return res.json();
}

function formatReminderTime(r){
  if(r.type === "once") return new Date(r.at).toLocaleString("ru-RU");
  const time = String(r.hour).padStart(2,"0") + ":" + String(r.minute||0).padStart(2,"0");
  if(r.type === "daily") return "каждый день в " + time;
  if(r.type === "weekly"){
    const days = ["","пн","вт","ср","чт","пт","сб","вс"];
    return "по " + (r.weekdays||[]).map(d=>days[d]).join(", ") + " в " + time;
  }
  return time;
}

async function switchTab(tab){
  document.querySelectorAll(".menuTab").forEach(el => el.classList.toggle("active", el.dataset.tab === tab));
  const body = document.getElementById("menuBody");
  body.textContent = "Загрузка...";

  try{
    if(tab === "memory"){
      const data = await apiGet("/api/memory");
      body.textContent = data.text;
    }else if(tab === "reminders"){
      const data = await apiGet("/api/reminders");
      if(!data.reminders.length){
        body.textContent = "Активных напоминаний нет.";
      }else{
        body.innerHTML = data.reminders.map(r =>
          '<div class="reminderItem"><div class="reminderName">' + escapeHtml(r.name) +
          '</div><div class="reminderWhen">' + escapeHtml(formatReminderTime(r)) + '</div></div>'
        ).join("");
      }
    }else if(tab === "settings"){
      body.innerHTML = '<button class="logoutBtn" onclick="logout()">Выйти (сбросить код доступа)</button>';
    }
  }catch(e){
    body.textContent = "Ошибка загрузки: " + e.message;
  }
}

function logout(){
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}

document.addEventListener("DOMContentLoaded", () => {
  const userText = document.getElementById("userText");
  userText.addEventListener("input", autoResizeInput);
  userText.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      sendText();
    }
  });

  document.getElementById("gateToken").addEventListener("keydown", (e) => {
    if(e.key === "Enter") submitToken();
  });

  if(tobiToken){
    document.getElementById("gate").classList.add("hidden");
    loadMessages();
  }
});
</script>

</body>
</html>
